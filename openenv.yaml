name: openenv-email
description: Smart Email Triage Environment for OpenEnv
version: 1.0.0
author: Thrivikram
license: MIT

tasks:
  - name: easy
    description: Classify email as 'spam' or 'not_spam'
    difficulty: easy
    observation: email_text (string)
    action: label (string: 'spam'|'not_spam')
    reward:
      correct: 1
      incorrect: -0.5
      bonus: 0.5

  - name: medium
    description: Classify email as 'work', 'personal', or 'promotions'
    difficulty: medium
    observation: email_text (string)
    action: label (string: 'work'|'personal'|'promotions')
    reward:
      correct: 1
      incorrect: -0.5
      bonus: 0.5

  - name: hard
    description: Assign priority and action
    difficulty: hard
    observation: email_text (string)
    action: priority (string: 'high'|'low'), action (string: 'reply'|'ignore'|'flag')
    reward:
      correct: 0.5
      incorrect: -0.25
      bonus: 0.5
